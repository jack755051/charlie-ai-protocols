# Workflow Run State Schema (draft v1)
#
# 定義 runtime 在執行 workflow 時應維護的 step state 與 blocked reason。

schema_version: 1

fields:
  workflow_id:
    type: string
    required: true

  run_id:
    type: string
    required: true

  state:
    type: string
    required: true
    enum: [pending, running, completed, failed, blocked, cancelled]

  steps:
    type: object[]
    required: true
    item_fields:
      step_id:
        type: string
      phase:
        type: integer
      capability:
        type: string
      execution_state:
        type: string
        enum: [pending, running, validated, soft_fail, hard_fail, blocked, skipped, timeout, stall]
      blocked_reason:
        type: string
        enum:
          - missing_input_artifact
          - missing_handoff
          - unresolved_binding
          - gate_not_satisfied
          - output_validation_failed
          - budget_exceeded
      required_inputs:
        type: string[]
      resolved_inputs:
        type: object[]
        item_fields:
          artifact:
            type: string
          source_step:
            type: string
          path:
            type: string
      declared_outputs:
        type: string[]
      materialized_outputs:
        type: object[]
        item_fields:
          artifact:
            type: string
          path:
            type: string
      continue_reason:
        type: string
      output_source:
        type: string
        enum: [agent_file, captured_stdout, empty_capture]
