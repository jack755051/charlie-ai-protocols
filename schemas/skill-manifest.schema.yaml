# Skill Manifest Schema (draft v1)
#
# 定義單一 agent-skill 匯入時應附帶的最小機器可讀資訊。

schema_version: 1

fields:
  skill_id:
    type: string
    required: true
    description: skill 的穩定識別碼，例如 generic-supervisor

  skill_version:
    type: string
    required: true
    description: skill 本身的版本

  provider:
    type: string
    required: true
    description: skill 提供者，例如 builtin / local / marketplace / langgraph

  entry:
    type: object
    required: true
    fields:
      prompt_file:
        type: string
      cli:
        type: string
      runtime:
        type: string

  provided_capabilities:
    type: object[]
    required: true
    description: 此 skill 可承接的 capability 與附帶政策
    item_fields:
      capability:
        type: string
      priority:
        type: integer
      binding_mode:
        type: string
        enum: [strict, preferred, fallback_allowed]
      missing_policy:
        type: string
        enum: [halt, substitute, manual]
      fallback_role:
        type: string
        description: 若此 skill 為 generic fallback，可標記其角色類型

  compatibility:
    type: object
    required: false
    fields:
      workflow_schema_versions:
        type: integer[]
      capability_schema_versions:
        type: integer[]
      handoff_schema_versions:
        type: integer[]

  enabled:
    type: boolean
    required: false

  metadata:
    type: object
    required: false
    fields:
      title:
        type: string
      description:
        type: string
      owner:
        type: string
