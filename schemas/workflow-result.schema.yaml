# Workflow Result Schema (v1, NORMALIZED CONTRACT)
#
# 定義一次 workflow run 完成後（或執行中快照）的 machine-readable normalized result contract。
# 把目前散落在 4 個檔案的資訊（runtime-state.json / run-summary.md / agent-sessions.json /
# workflow.log）合併成單一可機器消費的 artifact，作為 P7 result report builder 與 P10
# promote pipeline 的上游資料源。
#
# JSON-Schema 風格；可被 step_runtime.py validate-jsonschema 驗證。
#
# Producer / builder 邊界（重要）：
#   - **Current state (v0.21.6)**：沒有單一 producer 滿足此完整 contract。`cap-workflow-exec.sh`
#     寫 3 個 source artifact：
#       * `runtime-state.json` — 機器可讀但很低階（`artifacts` + `steps` 兩鍵；step 只有
#         phase / capability / execution_state / blocked_reason / output_source /
#         output_path / handoff_path 七欄位，沒有 run_id / final_state / duration）。
#       * `run-summary.md` — human-readable，含 run_id / workflow_id / started_at /
#         finished_at / total_duration_seconds / completed-failed-skipped 計數。
#       * `agent-sessions.json` — 結構化 sessions ledger（session_id / step_id / role /
#         capability / provider / executor / lifecycle / inputs / outputs / result /
#         duration / failure_reason）。
#     另外有 `workflow.log` 行式 audit trail。
#   - **Future builder (P7)**：result report builder 才是 producer，會 aggregate 上述四個
#     source 為單一 `workflow-result.json` artifact，符合本 schema。
#   - **`result.md` 定位**：本 schema 的 human-readable **projection**，由 P7 builder 同步
#     生成；不在本 schema 範圍內。
#
# 為什麼**現在**先寫此 normalized contract（即使 P7 builder 尚未實作）：
#   1. 沒有 contract，P7 builder 實作會 ad-hoc 拼湊；P10 promote pipeline 也會缺少穩定
#      消費介面。
#   2. Contract 先立，現有 runtime-state.json 的欠缺項目（run_id / final_state / duration
#      / failures / promote_candidates）才有對齊目標，後續 cap-workflow-exec.sh 也可
#      漸進往此 contract 靠攏。
#   3. P0 的目標是補齊 runtime contracts，不是立刻有 producer。
#
# 範圍邊界：
#   - 本 schema 驗證 envelope + 各 sub-array item 的 shape；不強制 cross-field 一致性
#     （如 `summary.completed == count(steps where status=ok)`）。Cross-field check 由
#     consumer 與 P7 builder 負責。
#   - Nullable 欄位採 `type: [string, "null"]` 或 `type: [integer, "null"]`，表達「執行
#     中尚未設定」或「不適用」狀態。

schema_version: 1
title: CAP Workflow Result Schema (normalized contract)
description: Machine-readable normalized result for one workflow run; aggregates runtime-state.json, run-summary.md, agent-sessions.json, workflow.log into a single artifact. NO CURRENT PRODUCER emits this contract directly; P7 result report builder will produce it. result.md is the human-readable projection owned by P7.

required:
  - schema_version
  - run_id
  - workflow_id
  - project_id
  - started_at
  - final_state
  - summary
  - steps
  - sessions
  - artifacts

properties:
  schema_version:
    type: integer
    enum: [1]
    description: Schema version for the workflow-result envelope.

  run_id:
    type: string
    description: Stable run id assigned by cap-workflow-exec.sh; matches the run_dir name (e.g., `run_20260501192422_033a65f8`).

  workflow_id:
    type: string
    description: Workflow id (e.g., `project-spec-pipeline`).

  workflow_name:
    type: string
    description: Optional human-readable workflow name; mirrored from the workflow definition.

  task_id:
    type: [string, "null"]
    description: Linked task constitution id when the run was launched via task-scoped flow; null for direct workflow runs.

  project_id:
    type: string
    description: CAP project id under ~/.cap/projects/<project_id>/; resolved by cap-paths runtime resolver.

  started_at:
    type: string
    description: ISO-8601 timestamp the run started (cap-workflow-exec.sh writes this into run-summary.md).

  finished_at:
    type: [string, "null"]
    description: ISO-8601 timestamp the run finished; null while the run is still in progress.

  total_duration_seconds:
    type: [integer, "null"]
    description: Wall-clock seconds from started_at to finished_at; null while running.

  final_state:
    type: string
    enum: [running, completed, failed, cancelled, blocked]
    description: |
      Aggregate run state.
      running: still in progress.
      completed: all required steps finished without halting failures.
      failed: at least one required step failed and was not routed back successfully.
      cancelled: external cancellation (Ctrl-C / signal / explicit cap workflow cancel).
      blocked: halted before producing a final outcome (binding blocked, sensitive risk halt, etc.).

  final_result:
    type: [string, "null"]
    enum: [success, partial, failed, null]
    description: Result classification when final_state=completed; null otherwise.

  summary:
    type: object
    required:
      - total_steps
      - completed
      - failed
      - skipped
      - blocked
    description: Aggregate per-status step counts. Cross-field consistency (sum equals total_steps) is the producer's responsibility, not enforced by this schema.
    properties:
      total_steps:
        type: integer
        description: Total step count from the compiled workflow.
      completed:
        type: integer
        description: Steps with status=ok.
      failed:
        type: integer
        description: Steps with status=failed.
      skipped:
        type: integer
        description: Steps with status=skipped (per unresolved_policy or explicit fallback).
      blocked:
        type: integer
        description: Steps with status=blocked (R2 record_blocked_step path; required_unresolved / unsupported_executor / etc.).

  steps:
    type: array
    description: Per-step runtime outcome; aligned with cap-workflow-exec.sh write order. Empty array allowed for runs that halted before any step executed.
    items:
      type: object
      required:
        - step_id
        - phase
        - capability
        - status
      properties:
        step_id:
          type: string
        phase:
          type: [integer, string]
          description: Phase number; current cap-workflow-exec.sh writes this as a string in runtime-state.json. Schema accepts both integer and string for migration tolerance.
        capability:
          type: string
        status:
          type: string
          enum: [ok, failed, skipped, blocked, running]
          description: Mapped from execution_state; `ok` is the runtime success label preserved from run-summary.md.
        execution_state:
          type: [string, "null"]
          description: Raw execution_state from runtime-state.json (validated / blocked / failed / completed / etc.); preserved for low-level introspection.
        duration_seconds:
          type: [integer, "null"]
          description: Per-step wall-clock seconds; null while running or for blocked steps that never executed.
        output_path:
          type: [string, "null"]
          description: Absolute path of the captured stdout / handoff body for this step.
        handoff_path:
          type: [string, "null"]
          description: Absolute path of the Type D handoff summary written by the sub-agent.
        output_source:
          type: [string, "null"]
          description: Source mode (e.g., `captured_stdout`, `artifact_fallback`).
        input_mode:
          type: [string, "null"]
          description: Inherited from compiled-workflow step.input_mode (full / summary).
        output_tier:
          type: [string, "null"]
          description: Inherited from compiled-workflow step.output_tier (planning_artifact / full_artifact / governance_report / machine_metadata).
        blocked_reason:
          type: [string, "null"]
          description: Populated when status=blocked; sourced from runtime-state.json blocked_reason via R2 helper.
        failure:
          type: ["object", "null"]
          description: Populated when status=failed; null otherwise. Cross-references failures[] for governance routing.
          properties:
            reason:
              type: string
            detail:
              type: [string, "null"]
            route_back_to:
              type: [string, "null"]
              description: Step id to route back to per workflow YAML; null when no route_back configured.

  sessions:
    type: array
    description: Per-session ledger entries aggregated from agent-sessions.json. Empty array allowed for runs with no AI / shell session yet.
    items:
      type: object
      required:
        - session_id
        - step_id
        - role
        - capability
        - executor
        - lifecycle
      properties:
        session_id:
          type: string
        step_id:
          type: string
        role:
          type: string
          description: Agent role (e.g., supervisor, ba, watcher) or shell.
        capability:
          type: string
        provider:
          type: [string, "null"]
          description: AI provider id (claude / codex / etc.) or builtin for shell sessions.
        provider_cli:
          type: [string, "null"]
        executor:
          type: string
          enum: [ai, shell]
        lifecycle:
          type: string
          enum: [created, running, completed, failed, cancelled, recycled]
        result:
          type: [string, "null"]
          enum: [success, failure, partial, null]
        duration_seconds:
          type: [integer, "null"]
        failure_reason:
          type: [string, "null"]

  artifacts:
    type: array
    description: Aggregated artifact registry for this run. Each entry has at minimum a name and path; producer_step_id and promoted are filled when known.
    items:
      type: object
      required:
        - name
        - path
      properties:
        name:
          type: string
          description: Artifact role (e.g., prd_document, ba_spec, archive_summary).
        path:
          type: string
          description: Absolute path under the run dir or repo. Schema enforces string type; existence is the producer's responsibility.
        producer_step_id:
          type: [string, "null"]
        promoted:
          type: [boolean, "null"]
          description: True when the artifact has been promoted back to the repo via P10 promote pipeline.

  failures:
    type: array
    description: Curated failure list for governance and route-back consumers. Empty array on a clean run. Each entry MUST include a reason and step_id; detail and route_back_to are optional.
    items:
      type: object
      required:
        - step_id
        - reason
      properties:
        step_id:
          type: string
        reason:
          type: string
        detail:
          type: [string, "null"]
        route_back_to:
          type: [string, "null"]

  promote_candidates:
    type: array
    description: Artifacts the supervisor or builder marked as candidates for promotion to the repo (P10). Empty when nothing is promotable yet.
    items:
      type: object
      required:
        - artifact_name
        - path
      properties:
        artifact_name:
          type: string
        path:
          type: string
        target_repo_path:
          type: [string, "null"]
        reason:
          type: [string, "null"]

  inputs:
    type: object
    description: |
      Best-effort pointer-only references to upstream sources for this run
      (constitution / compiled workflow / binding). The P7 result report
      builder records directory paths when the well-known cap-storage
      subdirs exist on disk under cap_home, otherwise ``null``. Pointer-only
      by design — the builder does NOT parse, validate, or pick a specific
      timestamped snapshot; it does NOT read the P3 supervisor orchestration
      envelope; and it does NOT load any other JSON-Schema. Callers (cap
      workflow inspect, human readers, P10 promote pipeline) must not assume
      a directory pointer implies a per-run snapshot match.
    properties:
      constitution_dir:
        type: [string, "null"]
        description: Path to <cap_home>/projects/<project_id>/constitutions/ when the dir exists; null otherwise. Task-scoped — without an explicit per-run task_id link, the builder cannot resolve a specific snapshot, so this is project-level and best-effort.
      compiled_workflow_dir:
        type: [string, "null"]
        description: Path to <cap_home>/projects/<project_id>/compiled-workflows/<workflow_id>/ when the dir exists; null otherwise.
      binding_dir:
        type: [string, "null"]
        description: Path to <cap_home>/projects/<project_id>/bindings/<workflow_id>/ when the dir exists; null otherwise.

  logs:
    type: ["object", "null"]
    description: Pointer to the workflow log file plus optional metadata. Null when no log was produced (degenerate runs).
    properties:
      workflow_log:
        type: string
        description: Absolute path of workflow.log.
      workflow_log_lines:
        type: [integer, "null"]
