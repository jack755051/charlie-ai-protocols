schema_version: 1
title: CAP Agent Session Schema
description: 一次性 agent worker session 的 runtime state contract，供 Claude / Codex / 其他 provider adapter 共用。

required:
  - session_id
  - run_id
  - workflow_id
  - step_id
  - role
  - capability
  - provider
  - provider_cli
  - executor
  - lifecycle
  - inputs
  - outputs

properties:
  session_id:
    type: string
    description: workflow run 內唯一 session id，例如 run_xxx.frontend
  run_id:
    type: string
    description: 所屬 workflow run id
  workflow_id:
    type: string
    description: 所屬 workflow id
  workflow_name:
    type: string
    nullable: true
    description: workflow 顯示名稱
  step_id:
    type: string
    description: 所屬 workflow step id
  parent_session_id:
    type: string
    nullable: true
    description: 若由另一 session 派生，記錄 parent id
  root_session_id:
    type: string
    nullable: true
    description: 派生鏈頂端 session id (P5 #7)。無 parent 時等於 self；有 parent 時繼承 parent.root_session_id；parent 不在 ledger 時 fallback 為 parent_session_id。Optional。
  spawn_reason:
    type: string
    nullable: true
    description: parent 派生此 session 的原因，例如 supervisor delegation reason 或 retry trigger (P5 #7). Optional, free-form。
  role:
    type: string
    description: agent alias，例如 supervisor、frontend、backend
  capability:
    type: string
    description: 對應 schemas/capabilities.yaml 的 capability
  provider:
    type: string
    enum:
      - codex
      - claude
      - crewai
      - langgraph
      - shell
      - builtin
  provider_cli:
    type: string
    description: 實際使用的 provider CLI 或 adapter，例如 codex、claude、shell
  executor:
    type: string
    enum:
      - ai
      - shell
      - graph
  prompt_file:
    type: string
    nullable: true
    description: 使用的 agent prompt file
  lifecycle:
    type: string
    enum:
      - planned
      - running
      - completed
      - failed
      - blocked
      - cancelled
      - recycled
  inputs:
    type: array
    items:
      type: object
      properties:
        artifact:
          type: string
        path:
          type: string
        mode:
          type: string
          enum: [summary, full, metadata]
  outputs:
    type: array
    items:
      type: object
      properties:
        artifact:
          type: string
        path:
          type: string
        promoted:
          type: boolean
  scratch_paths:
    type: array
    items:
      type: string
    description: 可回收的暫存路徑
  result:
    type: string
    enum:
      - success
      - blocked
      - failed
      - partial
      - cancelled
      - pending
      - skipped
  started_at:
    type: string
    nullable: true
  completed_at:
    type: string
    nullable: true
  duration_seconds:
    type: integer
    nullable: true
  failure_reason:
    type: string
    nullable: true
  recycle_policy:
    type: object
    properties:
      keep_raw_logs:
        type: boolean
      keep_prompts:
        type: boolean
      delete_scratch_on_success:
        type: boolean
  prompt_hash:
    type: string
    nullable: true
    description: SHA-256 hex digest of the rendered prompt text (P5 #6); used as content-addressable lookup key for `prompt_snapshot_path`. Optional.
  prompt_snapshot_path:
    type: string
    nullable: true
    description: Filesystem path of the snapshot file written under `<sessions_dir>/prompts/<hash[:2]>/<hash>.txt`. Multiple sessions sharing the same prompt content reference the same file (dedupe by hash). Optional.
  prompt_size_bytes:
    type: integer
    nullable: true
    description: Byte length of the rendered prompt text as encoded in UTF-8 (P5 #6). Optional, populated by AgentSessionRunner.
