# Unresolved Binding Report Schema (draft v1)
#
# 定義 semantic plan 綁定 skill 後的輸出格式。

schema_version: 1

fields:
  workflow_id:
    type: string
    required: true

  workflow_version:
    type: integer
    required: false

  binding_status:
    type: string
    required: true
    enum: [ready, degraded, blocked]

  summary:
    type: object
    required: true
    fields:
      total_steps:
        type: integer
      resolved_steps:
        type: integer
      fallback_steps:
        type: integer
      unresolved_required_steps:
        type: integer
      unresolved_optional_steps:
        type: integer

  steps:
    type: object[]
    required: true
    item_fields:
      step_id:
        type: string
      phase:
        type: integer
      capability:
        type: string
      optional:
        type: boolean
      resolution_status:
        type: string
        enum: [resolved, fallback_available, required_unresolved, optional_unresolved, incompatible]
      selected_skill_id:
        type: string
      selected_provider:
        type: string
      binding_mode:
        type: string
        enum: [strict, preferred, fallback_allowed]
      missing_policy:
        type: string
        enum: [halt, substitute, manual]
      reason:
        type: string
      candidate_skill_ids:
        type: string[]
