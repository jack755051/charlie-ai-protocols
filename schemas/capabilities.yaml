# Capability Contracts (v2)
#
# 本檔案是 capability 的唯一定義來源（SSOT），包含：
#   - 語意描述、預設 agent、允許 agent
#   - 輸入/輸出契約、完成條件
#
# capability 是流程語意，不是 agent 檔名。
# workflow 只引用 capability name；RuntimeBinder 在執行前從 skill registry 或 legacy adapter
# 解析 capability → skill / agent_alias / prompt_file / cli。
#
# 職責分工：
#   schemas/capabilities.yaml   — capability 契約（做什麼、誰來做、需要什麼、怎樣算完）
#   .cap.skills.yaml            — workflow binding 優先輸入（capability → skill / cli / fallback）
#   .cap.agents.json            — agent binding 相容層（alias → prompt_file / provider / cli）
#   schemas/workflows/*.yaml    — 流程編排（step 順序、依賴、失敗路由）
#   agent-skills/          — agent 定義 SSOT（完整 system prompt）

schema_version: 1

capabilities:

  # ── 管理與編排 ──

  prd_generation:
    description: 需求拆解與 PRD 產出
    default_agent: supervisor
    allowed_agents: [supervisor]
    inputs:
      - user_requirement
    outputs:
      - prd_document
    done_when:
      - PRD 摘要已產出並獲使用者確認

  workflow_orchestration:
    description: 工作流程編排、品質門禁控制與異常路由
    default_agent: supervisor
    allowed_agents: [supervisor]
    inputs:
      - workflow_definition
      - agent_outputs
    outputs:
      - handoff_tickets
      - gate_decisions
    done_when:
      - 所有 step 已依 workflow 定義執行或正確路由

  task_constitution_planning:
    description: |
      由 supervisor 讀取 Project Constitution（Type A）與使用者意圖，推導出單次任務的 Task Constitution（Type B），含 execution_plan / success_criteria / non_goals / stop_conditions / governance / budget。
      task constitution 是 per-task 文件，產出後寫入 ~/.cap/projects/<id>/constitutions/task_<id>.json，後續每個 step 派工的 handoff ticket（Type C，依 schemas/handoff-ticket.schema.yaml）由 supervisor 從中展開。
      本 capability 設計為 spec / implementation / qa 等 per-stage workflow 的固定第一步（如 project-spec-pipeline 的 init_task），給 cap CLI 提供穩定的工作清單顯示與計時，不再依賴 supervisor 在 ad-hoc 對話中即興產出。
      與 prd_generation 的差異：prd_generation 產出的是給人看的 Markdown PRD；本 capability 產出的是給 runtime 讀的結構化 task plan。兩者可在同一 workflow 中前後串接（task_constitution_planning → prd_generation）。
    default_agent: supervisor
    allowed_agents: [supervisor]
    inputs:
      - project_constitution
      - user_intent
      - goal_stage_hint
    outputs:
      - task_constitution
      - execution_plan
    done_when:
      - 已讀取 .cap.constitution.yaml 並對齊 allowed_agents / allowed_capabilities / stop_conditions
      - 已選定 goal_stage（informal_planning / formal_specification / implementation_preparation / implementation_and_verification）並對應產出 execution_plan
      - "v0.21.1+ 嚴格 schema：JSON 草稿 top-level 必含 8 個固定欄位（task_id / project_id / source_request / goal / goal_stage / success_criteria / non_goals / execution_plan），禁止別名（task_summary / user_intent_excerpt / scope 等）；execution_plan 每個 entry 必含 step_id 與 capability（不接受 target_capability 別名），可選 bound_to / needs / on_fail / route_back_to / timeout_seconds"
      - 已估算 budget（sub-agent session 數）並對齊 task-constitution.schema.yaml 的欄位
      - 已寫入 ~/.cap/projects/<project_id>/constitutions/task_<task_id>.json
      - 若 user_intent 對某 required 欄位資訊不足，已標記 needs_data 並停止，不擅自假設或用別名繞過

  design_source_ingest:
    description: |
      Read the project's design_source block (or legacy ~/.cap/designs/<project_id> fallback) and produce a stable, hash-cached summary bundle under `docs/design/`：`source-summary.md`、`source-tree.txt`、`design-source.yaml`，外加 `.source-hash.txt` sentinel。
      Skip rebuild when the SHA-256 over (relative-path + content) is unchanged AND all three artifacts exist — supports fast re-runs of project-spec-pipeline without re-reading the raw package.
      Constitution `design_source.type: none`、缺 block 且 legacy fallback path 為空，皆視為 no-op success（exit 0）；source_path 宣告但磁碟缺失則 halt（exit 40）。
      設計目的：讓 UI / TechPlan 等下游 step 採 summary-first（讀 `docs/design/source-summary.md`），不再每次面對 raw JSX/HTML package；同時透過 hash 投入是否 rebuild 的決策權。
    default_agent: shell
    allowed_agents: [shell]
    inputs:
      - project_constitution
      - design_source
    outputs:
      - design_source_summary
      - design_source_tree
      - design_source_metadata
    done_when:
      - 解析 design_source path 完成（憲法優先、legacy fallback、type none / 缺漏皆 graceful）
      - SHA256 hash 已計算並寫入 `docs/design/.source-hash.txt`
      - 三個 artifacts（source-summary.md / source-tree.txt / design-source.yaml）齊備或已標記 no-op
      - cache hit 時跳過 rebuild 並回報 outcome=cached
      - source_path 宣告但磁碟缺失時 halt（不偽造 summary）

  task_constitution_persistence:
    description: |
      把 task_constitution_planning 階段 supervisor 草擬的 Task Constitution JSON 寫入 ~/.cap/projects/<id>/constitutions/task_<task_id>.json，並進行最小驗證（required 欄位 task_id / project_id / goal / goal_stage / success_criteria 不缺，goal_stage 落在 enum 內）。
      這是 per-stage workflow（spec / implementation / qa）init_task 後續的 deterministic 持久化步驟；對應的 shell 實作為 scripts/workflows/persist-task-constitution.sh。
      與 constitution_persistence 區分：constitution_persistence 寫的是 Project Constitution（Type A，repo 級 SSOT）；本 capability 寫的是 Task Constitution（Type B，per-task 工作清單）。
    default_agent: shell
    allowed_agents: [shell]
    inputs:
      - task_constitution_draft
    outputs:
      - task_constitution
    done_when:
      - 已從 draft artifact 抓取 Task Constitution JSON 區段（<<<TASK_CONSTITUTION_JSON>>> fence 或 ```json 區塊）
      - 已驗證 required 欄位齊全（task_id / project_id / goal / goal_stage / success_criteria）
      - goal_stage 已落在 enum 內（informal_planning / formal_specification / implementation_preparation / implementation_and_verification）
      - 已寫入 ~/.cap/projects/<project_id>/constitutions/<task_id>.json
      - 已輸出寫入路徑供下游 emit_handoff_ticket / 各 sub-agent step 解析

  handoff_ticket_emit:
    description: |
      在每個 sub-agent step 派工前，依 task constitution 中的 execution_plan 條目展開單一 step 的 handoff ticket（Type C，依 schemas/handoff-ticket.schema.yaml），落地到 ~/.cap/projects/<id>/handoffs/<step_id>.ticket.json。
      ticket 是給 RuntimeBinder 與 sub-agent 共讀的工作單，含 target_capability / rules_to_load / context_payload / acceptance_criteria / output_expectations / governance / failure_routing 等欄位。
      本 capability 兼具 supervisor 與 shell 兩種 binding：在 workflow 中可顯式作為 deterministic step 由 scripts/workflows/emit-handoff-ticket.sh 執行；在 supervisor 主動派工時也可作為 supervisor 內部例行行為（per agent-skills/01-supervisor-agent.md §3.6）。
      ticket 的存在讓派工痕跡從 Agent prompt 字串提升為磁碟上可審計、可重跑、跨 runtime（Claude / Codex / CrewAI）共用的檔案；同時讓 cap CLI 可預覽即將下發的工作單內容。
      設計鐵則：
        - ticket 必須在 RuntimeBinder spawn sub-agent 之前已落地；spawn 失敗時 ticket 不刪除，作為審計痕跡。
        - 重跑同 step 時 ticket 檔名 seq 遞增（<step_id>.ticket.json → <step_id>-2.ticket.json → ...），舊 ticket 保留。
        - context_payload 預設走 summary-first（只塞 upstream handoff summary），audit 類 step 才允許走 full_artifact。
    default_agent: shell
    allowed_agents: [shell, supervisor]
    inputs:
      - task_constitution
      - target_step_id
      - upstream_handoff_summaries
    outputs:
      - handoff_ticket
    done_when:
      - 已從 task constitution 的 execution_plan 中抽出 target_step_id 的條目
      - ticket 完整對齊 schemas/handoff-ticket.schema.yaml 的 required 欄位
      - rules_to_load 已指定主 agent_skill 路徑 + 必要 strategies / policies
      - context_payload 預設走 summary-first；如需 full_artifact 已明確列出 upstream_full_artifacts
      - acceptance_criteria 對齊 capability 的 done_when + step 特定補強
      - failure_routing 已指定 on_fail（halt / route_back_to / retry / escalate_user）
      - ticket 已寫入 ~/.cap/projects/<project_id>/handoffs/<step_id>.ticket.json
      - 若 task constitution 中該 step 已標 status: completed，拒絕重複 emit（除非 force=true）

  prompt_outline_normalize:
    description: |
      把使用者一段或一句的自由 prompt，依目標 schema 拆解成「scalar 欄位草稿 / array 欄位草稿 / object 欄位草稿 / Markdown 敘事補充」四個分流，避免下游 draft 階段把多層次資訊塞錯欄位（例如把多目標、能力清單、out-of-scope 全壓進 type:string 的 project_goal 而踩 schema halt）。
      這是規劃型 workflow 的共用前置 capability：憲章、PRD、TechPlan 等都可以重用。本 capability 只暴露給 workflow runtime 使用，不在 cap CLI 開獨立呼叫入口（鎖死於 workflow，避免指令面膨脹）。
    default_agent: supervisor
    allowed_agents: [supervisor]
    inputs:
      - raw_user_prompt
      - target_schema_path
    outputs:
      - normalized_outline
      - schema_alignment_notes
    done_when:
      - 已讀取 target_schema_path 指向的 schema，並列出 required scalar / array / object 欄位
      - 已將使用者 prompt 中的長期目標濃縮為單一字串草稿，對應 schema 中 type:string 的 north-star 欄位（如 project_goal）
      - 已將清單型概念（限制、停機條件、out-of-scope）拆成 array 草稿
      - 已將結構型政策（治理 / 安全 / artifact 策略）整理為 object 草稿
      - 已標記敘事性內容應保留在 Markdown 主文，不要硬塞進 scalar 欄位
      - 若使用者 prompt 對某個 schema required 欄位資訊不足，已標記為 needs_data 而非自行假設

  project_constitution:
    description: 從使用者想法、偏好與專案上下文產生 Project Constitution，作為後續 repo 建立與 task workflow compile 的治理基礎
    default_agent: supervisor
    allowed_agents: [supervisor, techlead]
    inputs:
      - user_requirement
      - project_context
      - platform_defaults
      - normalized_outline
    outputs:
      - project_constitution
      - project_constitution_json
      - execution_policy
    done_when:
      - 已整理專案目標、限制、使用者規範與風險邊界
      - 已定義 executor_policy、allowed_agents、artifact policy 與後續 workflow 建議
      - 已輸出可保存的 Markdown 與 JSON constitution

  bootstrap_platform_defaults:
    description: 從 capabilities.yaml、project-constitution schema 與 repo 結構推導 Project Constitution bootstrap 所需的平台預設值（必填欄位、allowed_capabilities、source_of_truth、runtime_workspace），供 draft step 在 repo 尚無 .cap.constitution.yaml 時消化
    default_agent: shell
    allowed_agents: [shell]
    inputs:
      - project_context
    outputs:
      - platform_defaults
    done_when:
      - 已輸出 schema 必填欄位清單
      - 已輸出 allowed_capabilities 全名單
      - 已輸出 runtime_workspace 預設 stores 與 root 模板

  constitution_validation:
    description: 用 jsonschema 對照 schemas/project-constitution.schema.yaml 驗證 draft constitution JSON；schema fail 時 halt（不允許 AI fallback）
    default_agent: shell
    allowed_agents: [shell]
    inputs:
      - project_constitution
      - project_constitution_json
    outputs:
      - constitution_validation_report
    done_when:
      - 已從 draft artifact 抓取 constitution JSON 區段
      - 驗證通過時輸出 validation_report；失敗時 halt 並列出 schema 錯誤

  constitution_persistence:
    description: 把驗證通過的 Project Constitution JSON 寫成 repo 級 .cap.constitution.yaml 與 ~/.cap/projects/&lt;id&gt;/constitutions/ 快照，完成 bootstrap 收尾
    default_agent: shell
    allowed_agents: [shell]
    inputs:
      - project_constitution_json
      - constitution_validation_report
    outputs:
      - constitution_persisted_paths
    done_when:
      - 已寫入 repo 級 .cap.constitution.yaml
      - 已寫入 runtime workspace 的 timestamped JSON 快照
      - 已輸出寫入路徑供下游 compile 使用

  constitution_reconciliation_inputs:
    description: 載入既有 Project Constitution 與 addendum，整理成 reconciliation step 可讀的合併上下文
    default_agent: shell
    allowed_agents: [shell]
    inputs:
      - user_requirement
      - project_context
    outputs:
      - constitution_reconcile_inputs
    done_when:
      - 已讀取現有 .cap.constitution.yaml
      - 已整理 addendum 檔案或當次補充 prompt
      - 已產出供 AI reconciliation step 使用的上下文 artifact

  constitution_reconciliation:
    description: 依既有 Project Constitution 與 addendum 產出修正版草案，維持 SSOT 邊界並只做一次收斂
    default_agent: supervisor
    allowed_agents: [supervisor]
    inputs:
      - constitution_reconcile_inputs
    outputs:
      - project_constitution
      - project_constitution_json
      - execution_policy
    done_when:
      - 已吸收既有 constitution 與 addendum
      - 已輸出單一修正版 constitution 草案
      - 未引入新的治理來源或自動迴圈

  # ── 分析與設計 ──

  technical_planning:
    description: 模組層級技術可行性評估與架構細化
    default_agent: techlead
    allowed_agents: [techlead]
    inputs:
      - prd_document
    outputs:
      - tech_plan
    done_when:
      - TechPlan 已產出，含技術選型、風險評估與下游建議

  business_analysis:
    description: 業務流程分析、Bounded Context 識別與領域語彙鎖定
    default_agent: ba
    allowed_agents: [ba]
    inputs:
      - prd_document
      - tech_plan
    outputs:
      - ba_spec
    done_when:
      - BA 規格書已產出，含流程圖、狀態機、Bounded Context 與語彙表

  database_api_design:
    description: 資料庫 SSOT 建模與 API 介面合約設計
    default_agent: dba
    allowed_agents: [dba]
    inputs:
      - ba_spec
      - tech_plan
    outputs:
      - schema_ssot
      - api_spec
    done_when:
      - Schema SSOT 與 API 規格書已產出
      - DTO 欄位與 Schema 100% 對齊

  ui_design:
    description: 設計系統、Design Tokens 與設計資產產出
    default_agent: ui
    allowed_agents: [ui]
    inputs:
      - ba_spec
      - api_spec
    outputs:
      - ui_spec
      - tokens_json
      - screens_json
      - prototype_html
    done_when:
      - UI 規格書與四項設計資產已產出
      - 資產間命名、色彩、字級一致

  figma_sync:
    description: 設計資產同步到 Figma
    default_agent: figma
    allowed_agents: [figma]
    inputs:
      - ui_spec
      - tokens_json
      - screens_json
      - prototype_html
    outputs:
      - figma_sync_report
    done_when:
      - 同步報告已產出，標示成功/失敗範圍

  analytics_specification:
    description: KPI 樹、事件追蹤字典、漏斗定義與實驗設計
    default_agent: analytics
    allowed_agents: [analytics]
    inputs:
      - ba_spec
      - api_spec
      - ui_spec
    outputs:
      - analytics_spec
    done_when:
      - Analytics 規格書已產出，含 KPI Tree、Event Dictionary、Funnel

  analytics_post_launch:
    description: 上線後數據回讀與洞察報告
    default_agent: analytics
    allowed_agents: [analytics]
    inputs:
      - live_data
      - analytics_spec
    outputs:
      - insight_report
    done_when:
      - 洞察報告已產出，含觀察區間、指標表現與建議

  # ── 實作 ──

  frontend_implementation:
    description: 前端實作與單元測試
    default_agent: frontend
    allowed_agents: [frontend]
    inputs:
      - ba_spec
      - api_spec
      - ui_spec
      - tokens_json
      - screens_json
      - prototype_html
      - analytics_spec
    outputs:
      - frontend_code
      - frontend_unit_tests
      - frontend_handoff_summary
    done_when:
      - 程式碼與測試已交付
      - data-testid 已預埋
      - 四態齊備 (loading/empty/error/success)

  backend_implementation:
    description: 後端實作與單元測試
    default_agent: backend
    allowed_agents: [backend]
    inputs:
      - api_spec
      - schema_ssot
    outputs:
      - backend_code
      - backend_unit_tests
      - backend_handoff_summary
    done_when:
      - 程式碼與測試已交付
      - Entity 與 Migration 對齊 Schema SSOT
      - 健康探針與指標端點已實作

  # ── 品質門禁 ──

  code_structure_audit:
    description: 交叉比對稽核：規格 vs 代碼 vs 設計資產
    default_agent: watcher
    allowed_agents: [watcher]
    inputs:
      - ba_spec
      - api_spec
      - ui_spec
      - schema_ssot
      - frontend_code
      - backend_code
    outputs:
      - audit_report
    done_when:
      - 稽核清單全數通過，或異常報告已產出

  tool_spec_audit:
    description: 小工具規劃交付前的一致性稽核：PRD、TechPlan、BA、API/資料契約與 UI 規格是否互相對齊
    default_agent: watcher
    allowed_agents: [watcher, techlead]
    inputs:
      - prd_document
      - tech_plan
      - ba_spec
      - schema_ssot
      - api_spec
      - ui_spec
    outputs:
      - spec_audit_report
    done_when:
      - 已確認規格間沒有明顯互相矛盾
      - 已列出進入實作前必須補齊的缺口
      - 已標示是否可進入 frontend/backend/devops/qa 後續流程

  security_audit:
    description: 左移安全掃描：SQL 注入、IDOR、機敏洩漏、Auth 漏洞
    default_agent: security
    allowed_agents: [security]
    inputs:
      - frontend_code
      - backend_code
    outputs:
      - security_report
    done_when:
      - 安全掃描完成，無 CRITICAL/HIGH 未修復項目

  qa_testing:
    description: E2E 測試、壓力測試與 Lighthouse 稽核
    default_agent: qa
    allowed_agents: [qa]
    inputs:
      - ba_spec
      - api_spec
      - frontend_code
      - backend_code
    outputs:
      - test_report
      - lighthouse_report
    done_when:
      - E2E 測試通過
      - k6 壓測 p95 < 500ms、Error Rate < 1%
      - Lighthouse 四大分數達標（若適用）

  # ── 維運與診斷 ──

  troubleshooting:
    description: 全棧根因分析與修復建議
    default_agent: troubleshoot
    allowed_agents: [troubleshoot]
    inputs:
      - error_evidence
    outputs:
      - diagnostic_report
      - fix_recommendation
    done_when:
      - 診斷報告已產出，含根因分類與建議處置路由

  sre_optimization:
    description: 效能瓶頸診斷、快取策略與可觀測性優化
    default_agent: sre
    allowed_agents: [sre]
    inputs:
      - test_report
      - frontend_code
      - backend_code
      - schema_ssot
    outputs:
      - optimization_plan
    done_when:
      - 優化方案已產出
      - 若修改 Schema 已同步回 SSOT

  devops_delivery:
    description: 容器化、CI/CD 與部署配置
    default_agent: devops
    allowed_agents: [devops, sre]
    inputs:
      - frontend_code
      - backend_code
      - test_report
    outputs:
      - ci_config
      - deploy_spec
    done_when:
      - CI/CD 或部署基線已建立
      - 資源配額與健康探針已配置

  version_control_commit:
    description: 版本控制提交、commit 訊息整理與最小 Git 交付
    default_agent: devops
    allowed_agents: [devops]
    inputs:
      - repo_changes
      - commit_scope
      - project_context
    outputs:
      - commit_result
      - commit_message
    done_when:
      - 已整理 commit 範圍與訊息
      - 已完成最小版本控制提交或明確回報阻塞原因

  version_control_tag:
    description: Tag 判定、版號決策、CHANGELOG 與 README 版本同步，以及 commit 後的 tag 建立與推送
    default_agent: devops
    allowed_agents: [devops]
    inputs:
      - repo_manifest
      - repo_summary
      - repo_changes
      - commit_result
      - commit_message
      - release_doc_sync
      - changelog_update
      - tag_decision
      - project_context
    outputs:
      - tag_decision
      - changelog_update
      - release_doc_sync
      - tag_result
    done_when:
      - 已判定是否需要 tag 並說明理由
      - 若處於 commit 前判定階段：CHANGELOG.md 與 README.md 版本已更新或明確標示略過
      - 若處於 commit 後發版階段：依既有 tag_decision 建立 tag，或明確說明為何跳過

  # ── 紀錄 ──

  technical_logging:
    description: Trace Log、Devlog 與 Changelog 維護
    default_agent: logger
    allowed_agents: [logger]
    inputs:
      - handoff_summaries
      - audit_reports
      - test_reports
    outputs:
      - trace_log
      - devlog
      - changelog
    done_when:
      - 紀錄已依指定 record_level 寫入

  # ── 輔助 ──

  readme_normalization:
    description: README 治理與 Repo Intake
    default_agent: readme
    allowed_agents: [readme]
    inputs:
      - repo_files
    outputs:
      - repo_manifest
      - repo_summary
    done_when:
      - README 或 manifest 已依治理規則補齊
      - 命令與入口點可在 repo 中找到證據

  technical_review:
    description: 技術交付物審閱與完整度確認
    default_agent: techlead
    allowed_agents: [techlead, supervisor]
    inputs:
      - delivery_artifacts
    outputs:
      - review_note
    done_when:
      - 已確認交付資訊完整度
      - 已指出缺漏與風險
