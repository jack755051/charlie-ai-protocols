workflow_id: version-control
version: 7
name: Version Control
summary: 版本控制 pipeline：vc_scan(shell) 掃描並產 evidence pack；vc_compose(AI) 依 evidence 產 commit envelope JSON；vc_apply(shell) 過 lint 後執行 git ops。Shell 不再猜語意，AI 不再重跑 git；fast / governed / strict 差異由 strategy 定義，不再拆成多份版本控制 YAML。
owner: supervisor
triggers:
  - manual
  - version-control

artifacts:
  vc_evidence_pack: scan 階段輸出的結構化 evidence（YAML in evidence block）
  commit_envelope: compose 階段輸出的 commit 結構化 JSON
  commit_result: apply 階段執行 git ops 的結果

strategies:
  fast:
    summary: 日常 commit-only，體驗優先；禁止 release / tag / CHANGELOG path。
    release_allowed: false
    prompt_profile: compact
    artifact_level: minimal
    require_body: false
    watcher_level: none
    apply_policy: commit_only
  governed:
    summary: 一般治理版控；可依 release_intent 執行 tag / CHANGELOG / README 同步。
    release_allowed: true
    prompt_profile: standard
    artifact_level: standard
    require_body_for_cross_module: true
    watcher_level: final
    apply_policy: release_allowed
  strict:
    summary: 高治理 / 公司場景；重大、跨模組或 schema/CLI 變更必須說明影響與遷移。
    release_allowed: true
    prompt_profile: strict
    artifact_level: full
    require_body: true
    require_impact_statement: true
    require_migration_note_for_schema_or_cli: true
    watcher_level: checkpoint
    apply_policy: release_allowed

governance:
  watcher_mode: final_only
  logger_mode: final_only
  watcher_checkpoints: [vc_apply]
  logger_checkpoints: [vc_apply]
  halt_on_missing_handoff: false

steps:
  - id: vc_scan
    name: Scan repo and emit evidence pack
    capability: version_control_commit
    executor: shell
    script: scripts/workflows/vc-scan.sh
    inputs:
      - repo_changes
      - commit_scope
      - project_context
    outputs:
      - vc_evidence_pack
    done_when:
      - 已偵測 git work tree 與分支狀態（detached_head 直接 halt）
      - 已偵測敏感檔案（命中即 halt，不交給 AI）
      - 已偵測 no_changes 並以 exit 10 結束 workflow，避免下游空跑
      - 已輸出含 path_tokens / release_intent / next_tag_candidate / diff_excerpt 的 evidence pack
    on_fail: halt
    timeout_seconds: 60
    notes:
      - shell 嚴禁推斷 commit type / scope / subject；只負責 scan + 守門
      - release_intent 由使用者 prompt 偵測，未命中時 compose 不得擅自發版
      - strategy 由 runtime 注入；fast 策略下 release path 必須關閉，strict 策略下語意輸出需更完整
      - exit code 契約見 docs/policies/workflow-executor-exit-codes.md

  - id: vc_compose
    name: Compose commit envelope from evidence
    capability: version_control_commit
    needs:
      - vc_scan
    inputs:
      - vc_evidence_pack
    outputs:
      - commit_envelope
    done_when:
      - 已讀取 vc_evidence_pack 中的結構化 evidence（不得重新跑 git）
      - 已產出含 commit_type/scope/subject/body/release 結構的 envelope JSON，包覆於 <<<COMMIT_ENVELOPE_BEGIN>>> ... <<<COMMIT_ENVELOPE_END>>>
      - subject 必須命中至少一個 evidence.path_tokens，並避開禁止主動詞清單
      - 若 evidence.release_intent=false，envelope.release.perform_release 必須為 false
      - 若 release_intent=true，必須產出符合 git-workflow.md 規範的 tag/annotation_summary/changelog_entries
    on_fail: halt
    timeout_seconds: 240
    notes:
      - "本 step 為純語意工作：根據 evidence 寫出可被 vc_apply lint 通過的 envelope"
      - "strategy=fast：必須產出 release.perform_release=false，即使 evidence.release_intent=true 也不得發版"
      - "strategy=governed：依 evidence.release_intent 自然走 release 或 commit-only path"
      - "strategy=strict：重大、跨模組、schema 或 CLI 變更必須在 body 說明影響範圍、Breaking Change 與 migration notes"
      - "禁止使用 enforce/sync/refine/unify/streamline/consolidate/clarify/harden/strengthen/establish/introduce/govern/finalize/polish/adjust/tweak/optimize/enhance 作為 subject 或 annotation 的主動詞"
      - "subject 必須具體說明改了什麼（動詞 + 具體名詞），且必須引用至少一個 path_token（檔名或目錄段）"
      - "annotation_summary 必須以 '<tag> — ' 開頭，summary 部分同樣引用 path_token"
      - "changelog_entries 每條必須描述真實變更，不得為 'update X workflow assets' / 'release vX.Y.Z' / 'sync release documentation'"
      - "若 git diff 顯示多種 type（feat/fix/docs 並存），必須挑主導 type 並在 body 說明其他次要變更"

  - id: vc_apply
    name: Lint envelope and execute git ops
    capability: version_control_commit
    executor: shell
    script: scripts/workflows/vc-apply.sh
    input_mode: full
    needs:
      - vc_compose
    inputs:
      - vc_evidence_pack
      - commit_envelope
    outputs:
      - commit_result
    done_when:
      - 已從 commit_envelope artifact 解析出有效 JSON
      - 已通過 subject / scope / annotation / changelog_entries 全部 lint 規則（撞到任一條 halt）
      - 已執行 git add -A、git commit；若 envelope.release.perform_release=true 且 evidence.release_intent=true，已同步 CHANGELOG.md / README.md、建立 annotated tag、推送 commit 與 tag
      - 若無 upstream 已明確回報 no_upstream_configured，不得失敗
    on_fail: halt
    timeout_seconds: 120
    notes:
      - lint fail（subject 太短 / 主動詞被禁 / 不含 path_token / annotation 不合規）一律 halt，不退回 AI fallback
      - sensitive_file_risk 已在 vc_scan 擋下，這裡不重做
      - release path 會把 CHANGELOG/README amend 進同一個 commit，再建立 annotated tag
      - fast strategy 下 envelope.release.perform_release 必須為 false；若不是，apply lint 應阻擋
