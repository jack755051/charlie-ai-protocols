workflow_id: version-control-private
version: 3
name: Private Project Version Control
summary: 私人專案版本控制：單一 DevOps session 完成 scan → branch → commit → tag 判定 → CHANGELOG/README → push。
owner: supervisor
triggers:
  - manual
  - version-control
  - private-project

artifacts:
  commit_result: 版本控制提交結果
  tag_result: Tag 建立與推送結果（若有）
  changelog_update: CHANGELOG.md 更新內容（若有）

governance:
  watcher_mode: final_only
  logger_mode: final_only
  watcher_checkpoints: [version_control]
  logger_checkpoints: [version_control]
  halt_on_missing_handoff: false

steps:
  - id: version_control
    name: Full Version Control
    capability: version_control_commit
    inputs:
      - repo_changes
      - project_context
    outputs:
      - commit_result
      - tag_result
      - changelog_update
    done_when:
      - 已掃描 git status / diff / log，判定變更範圍與類型
      - 已依 git-workflow.md 決定分支策略（情境 A 直接 commit 或情境 B 開分支）
      - 已完成 commit，訊息符合 Conventional Commits 規範
      - 已判定是否需要 tag（feat=minor, fix=patch, docs/chore/style=通常不需要）
      - 若需要 tag：已更新 CHANGELOG.md（Keep a Changelog 格式）與 README.md 版本引用
      - 若需要 tag：tag 已建立，合併回 main 並推送至遠端
      - 若不需要 tag：已說明原因，僅推送 commit
    on_fail: halt
    timeout_seconds: 300
    notes:
      - 所有操作在單一 agent session 中完成，不拆分多個 step
      - 預設由 06-devops-agent 執行
      - 推送前須確認無敏感檔案混入
      - "本 step 在非互動模式（claude -p）下執行，agent 無法暫停等使用者確認。請依最佳判斷直接執行，不要輸出 Pre-action Checklist 等待回覆。"
      - "執行完所有 git 操作後，必須在 stdout 輸出完整的版本控制報告，包含：掃描結果、分支決策、commit 清單、tag 判定、推送結果。若 stdout 為空，executor 會判定為失敗。"
