workflow_id: version-control-private
version: 1
name: Private Project Version Control
summary: 私人專案先進行 README 治理與 repo metadata 補齊，再執行版本控制提交。
owner: supervisor
triggers:
  - manual
  - version-control
  - private-project

artifacts:
  repo_manifest: 機器可解析的 repo metadata
  repo_summary: 人類可讀的 repo 導讀摘要
  commit_message: 版本控制提交訊息
  commit_result: 版本控制提交結果

governance:
  watcher_mode: final_only
  logger_mode: final_only
  watcher_checkpoints: [commit_changes]
  logger_checkpoints: [commit_changes]
  halt_on_missing_handoff: true

steps:
  - id: normalize_repo
    name: Normalize README And Repo Metadata
    capability: readme_normalization
    outputs:
      - repo_manifest
      - repo_summary
    done_when:
      - README.md 或 repo.manifest.yaml 已依治理規範補齊
      - repo 啟動與測試命令已與實際檔案對照
    on_fail: halt
    notes:
      - 私人專案優先維持 repo 文件完整度與可解析性

  - id: commit_changes
    name: Commit Changes
    capability: version_control_commit
    needs:
      - normalize_repo
    inputs:
      - repo_manifest
      - repo_summary
      - repo_changes
      - commit_scope
      - project_context
    outputs:
      - commit_message
      - commit_result
    done_when:
      - 已完成 commit 或明確回報阻塞原因
      - commit 訊息符合版本控制規範
    on_fail: halt
    notes:
      - 預設由 06-devops-agent 執行，但 workflow 不綁死 agent 檔名
