workflow_id: version-control-private
version: 4
name: Private Project Version Control
summary: 私人專案版本控制：shell quick path 優先完成低語意 scan → commit → push；明確發版時回流 AI 掃描 diff 後同步 CHANGELOG / README、建立 tag 並推送。
owner: supervisor
triggers:
  - manual
  - version-control
  - private-project

artifacts:
  commit_message: 版本控制提交訊息
  commit_result: 版本控制提交結果
  tag_result: Tag 建立與推送結果（若有）
  changelog_update: CHANGELOG.md / README.md 發版同步結果（若有）

governance:
  watcher_mode: final_only
  logger_mode: final_only
  watcher_checkpoints: [version_control]
  logger_checkpoints: [version_control]
  halt_on_missing_handoff: false

steps:
  - id: version_control
    name: Hybrid Private Version Control
    capability: version_control_commit
    executor: shell
    script: scripts/workflows/version-control-private.sh
    fallback:
      executor: ai
      when:
        - ambiguous_change_type
        - mixed_change_type
        - git_operation_failed
    inputs:
      - repo_changes
      - commit_scope
      - project_context
    outputs:
      - commit_message
      - commit_result
      - tag_result
      - changelog_update
    done_when:
      - 已掃描 git status / diff，判定變更範圍與類型
      - 可安全自動化時，shell quick path 已完成 commit，訊息符合 Conventional Commits 規範
      - 若使用者明確要求正式發版 / release / tag / CHANGELOG / README，必須回流 AI 掃描 diff 後產生 commit message / release notes，再同步 CHANGELOG.md 與 README.md、建立 tag 並推送
      - 若沒有變更，已以 no_changes no-op 成功回報
      - 若變更類型 ambiguous / mixed 或 git 操作失敗，已依 fallback.when 回流 AI
      - 若偵測 sensitive_file_risk，已直接 halt，不交給 AI fallback
      - 已依可用 upstream 推送，或明確回報未設定 upstream
    on_fail: halt
    timeout_seconds: 120
    notes:
      - shell step 遵守 docs/policies/workflow-executor-exit-codes.md
      - 非發版 happy path 不啟動 AI，以降低時間與 token 成本
      - 明確發版意圖下，shell 只提供掃描證據與建議 tag，必須以 ambiguous_change_type 回流 AI，避免機械式 commit message / changelog
      - AI fallback 處理 ambiguous_change_type、mixed_change_type、git_operation_failed；其中 ambiguous_change_type 也涵蓋 release_requires_ai_semantic_review
      - policy_blocked 預設 halt；sensitive_file_risk 永遠 halt
      - 推送前須確認無敏感檔案混入
      - "若進入 AI fallback，agent 必須根據 shell stdout/stderr、git status 與 diff stat 接手，不得重新擴大 scope。"
