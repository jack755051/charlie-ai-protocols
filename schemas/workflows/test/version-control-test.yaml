workflow_id: version-control-test
version: 2
name: Version Control Hybrid Executor Fixture
summary: 測試用 workflow fixture：驗證 shell executor、exit code contract 與 AI fallback metadata 是否可被 runtime 載入。
owner: supervisor
status: test_fixture
triggers:
  - test
  - hybrid-executor

artifacts:
  commit_message: 測試提交訊息
  commit_result: 測試提交結果

governance:
  watcher_mode: off
  logger_mode: final_only
  watcher_checkpoints: []
  logger_checkpoints: [version_control]
  halt_on_missing_handoff: false

steps:
  - id: version_control
    name: Version Control Hybrid Executor Test
    capability: version_control_commit
    executor: shell
    script: scripts/workflows/version-control-private.sh
    fallback:
      executor: ai
      when:
        - ambiguous_change_type
        - mixed_change_type
        - git_operation_failed
    inputs:
      - repo_changes
      - commit_scope
      - project_context
    outputs:
      - commit_message
      - commit_result
    done_when:
      - shell executor metadata 可被 workflow loader / runtime binder 保留
      - exit code 10 可視為 no-op 成功
      - exit code 20 / 21 / 40 可依 fallback.when 回流 AI
      - exit code 30 預設 halt
      - exit code 50 強制 halt 且不得 fallback
    on_fail: halt
    timeout_seconds: 30
    notes:
      - 本檔保留於 schemas/workflows/test/，作為 hybrid executor contract 的回歸測試 fixture
      - 不列為現役 workflow；正式私人專案入口是 schemas/workflows/version-control-private.yaml
