workflow_id: project-constitution-reconcile
version: 1
name: Project Constitution Reconcile
summary: 以既有 Project Constitution 為基底，吸收補充 prompt 後產出 schema-valid 的修正版草案，再驗證並持久化覆寫。
owner: supervisor
triggers:
  - manual
  - constitution-reconcile
  - constitution-addendum

artifacts:
  constitution_reconcile_inputs: Current constitution plus addendum bundled for the AI reconciliation step
  normalized_outline: Schema-aware outline that splits the addendum prompt into scalar / array / object / markdown buckets before reconcile
  schema_alignment_notes: Notes on which addendum fragments map to which schema fields, plus needs_data markers
  project_constitution: Reconciled Project Constitution Markdown
  project_constitution_json: Reconciled Project Constitution JSON
  execution_policy: Executor selection and lifecycle policy
  constitution_validation_report: Schema validation result for the reconciled constitution
  constitution_persisted_paths: Resolved repo target and snapshot paths after persistence

governance:
  watcher_mode: milestone_gate
  logger_mode: milestone_log
  watcher_checkpoints: [reconcile_constitution, validate_constitution, persist_reconciled_constitution]
  logger_checkpoints: [load_reconcile_inputs, normalize_outline, reconcile_constitution, validate_constitution, persist_reconciled_constitution]
  halt_on_missing_handoff: false
  context_mode: summary_first
  goal_stage: informal_planning

steps:
  - id: load_reconcile_inputs
    name: Load Existing Constitution And Supplemental Prompt
    capability: constitution_reconciliation_inputs
    executor: shell
    script: scripts/workflows/load-constitution-reconcile-inputs.sh
    inputs:
      - user_requirement
      - project_context
    outputs:
      - constitution_reconcile_inputs
    done_when:
      - 已讀取 repo 級 .cap.constitution.yaml
      - 已將 addendum 檔案或當次補充 prompt 整理為 AI 可讀的上下文
      - 已明確區分「外部補充輸入」與「憲法本體」
    on_fail: halt
    fallback:
      when: []
    timeout_seconds: 60
    input_mode: full
    output_tier: planning_artifact
    notes:
      - addendum 是 workflow 輸入，不是憲法的一部分
      - 若 addendum 檔不存在，workflow 仍可直接使用使用者當次 prompt

  - id: normalize_outline
    name: Normalize Addendum Prompt Into Schema-Aligned Outline
    capability: prompt_outline_normalize
    executor: ai
    needs:
      - load_reconcile_inputs
    inputs:
      - constitution_reconcile_inputs
    outputs:
      - normalized_outline
      - schema_alignment_notes
    done_when:
      - 已對照 schemas/project-constitution.schema.yaml 的 type 結構，列出 addendum 應落腳的 scalar / array / object 欄位
      - 已將 addendum 拆成 scalar 草稿（如 project_goal 一句話 north star 修正）、array 草稿（如新增的 constraints / stop_conditions 條目）、object 草稿（如治理 / 安全政策結構增修）與 Markdown 敘事補充四個分流
      - 已在 schema_alignment_notes 標明各分流對應的 schema 欄位、與 baseline 的差異點，以及任何 needs_data / requires_confirmation 標記
      - 嚴禁在本 step 直接重寫憲章 JSON；本 step 只產出供 reconcile_constitution 抄寫的結構化 outline
    on_fail: halt
    fallback:
      when: []
    timeout_seconds: 240
    input_mode: full
    output_tier: planning_artifact
    notes:
      - 本 step 是 reconcile_constitution 的前置防呆：把 addendum 預先對齊 schema 的 scalar / array / object 邊界，避免把多目標壓進單一 scalar 欄位而踩 schema halt。
      - target_schema 鎖定為 schemas/project-constitution.schema.yaml；若未來重用本 capability 於其他 reconcile 流程，需在各自 workflow 注入對應 schema 路徑。

  - id: reconcile_constitution
    name: Reconcile Constitution From Existing Baseline And Addendum
    capability: constitution_reconciliation
    executor: ai
    needs:
      - normalize_outline
    inputs:
      - constitution_reconcile_inputs
      - normalized_outline
      - schema_alignment_notes
    outputs:
      - project_constitution
      - project_constitution_json
      - execution_policy
    done_when:
      - 已讀取現有 Project Constitution 與 addendum
      - 已保留 source_of_truth / runtime_workspace / binding_policy / workflow_policy / executor_policy 的治理邊界
      - 已依 addendum 內容做最小必要調整，不得擅自建立新的治理來源
      - 已輸出 Markdown 與 JSON 雙形態的修正版 constitution
      - JSON 必須包覆於 <<<CONSTITUTION_JSON_BEGIN>>> 與 <<<CONSTITUTION_JSON_END>>> 之間
    on_fail: halt
    fallback:
      when: []
    timeout_seconds: 240
    input_mode: full
    output_tier: planning_artifact
    notes:
      - 若 addendum 內容與既有憲章衝突，優先維持較安全、較小範圍的變更，並在交接摘要說明取捨
      - 這個 workflow 只允許一次重構，不應自動迴圈重跑

  - id: validate_constitution
    name: Validate Reconciled Constitution Against Schema
    capability: constitution_validation
    executor: shell
    script: scripts/workflows/validate-constitution.sh
    needs:
      - reconcile_constitution
    inputs:
      - project_constitution
      - project_constitution_json
    outputs:
      - constitution_validation_report
    done_when:
      - 已從 reconcile artifact 抓取 constitution JSON 區段
      - 已用 jsonschema 對照 schemas/project-constitution.schema.yaml 完成驗證
      - 驗證通過時輸出 constitution_validation_report；失敗時 halt 並列出 schema 錯誤
    on_fail: halt
    fallback:
      when: []
    timeout_seconds: 30
    input_mode: full
    output_tier: machine_metadata
    notes:
      - reconcile 失敗代表 addendum 或 baseline 仍需人工修正，不進行 AI 自動迴圈
      - 本 step 已加入 watcher_checkpoints；通過後才允許進入 persist。

  - id: persist_reconciled_constitution
    name: Persist Reconciled Constitution To Repo SSOT And Runtime Snapshot
    capability: constitution_persistence
    executor: shell
    script: scripts/workflows/persist-constitution.sh
    needs:
      - validate_constitution
    inputs:
      - project_constitution_json
      - constitution_validation_report
    outputs:
      - constitution_persisted_paths
    done_when:
      - 已覆寫 repo 級 .cap.constitution.yaml（或在 dry-run 模式下輸出 diff 並 skip）
      - 已產出 .cap.constitution.yaml.backup-<TIMESTAMP> 副本以便回滾（覆寫路徑時）
      - 已寫入 ~/.cap/projects/<project_id>/constitutions/<timestamp>.json 快照
      - 已建立或沿用 ~/.cap/projects/<project_id>/workspace/ 骨架目錄
      - 已輸出寫入路徑與 project_id 供下游 workflow 讀回
    on_fail: halt
    fallback:
      when: []
    timeout_seconds: 30
    input_mode: full
    output_tier: machine_metadata
    notes:
      - 這個 step 會以覆寫模式更新現有 constitution，讓 addendum 真正收斂成新的 SSOT。
      - 仍不得把 addendum 本身存入 constitution。
      - "Overwrite contract：cap-workflow-exec.sh 偵測 step_id=persist_reconciled_constitution 時自動注入 CAP_CONSTITUTION_OVERWRITE=1；非此 step 不應注入該 env，避免誤覆寫平台自身 constitution。"
      - "Backup contract：覆寫前 persist-constitution.sh 會先把既有 .cap.constitution.yaml 複製為 .cap.constitution.yaml.backup-<TIMESTAMP>，提供基本回滾路徑。"
      - "Dry-run contract：執行前若需先看 diff，可設 CAP_CONSTITUTION_DRY_RUN=1，本 step 將輸出 unified diff 並 exit 0，不寫入 repo SSOT；snapshot / scaffold 仍會記錄。"
