workflow_id: version-control-quick
version: 2
name: Quick Version Control
summary: 私人專案快速版控 pipeline：scan(shell) → compose(AI) → apply(shell)。與 private 共用 step，但禁止 release path；compose 必須產出 perform_release=false 的 envelope，apply 即使 evidence.release_intent=true 也只做 commit + push，不建 tag、不寫 CHANGELOG。
owner: supervisor
triggers:
  - manual
  - version-control
  - private-project
  - quick

artifacts:
  vc_evidence_pack: scan 階段輸出的結構化 evidence
  commit_envelope: compose 階段輸出的 commit 結構化 JSON（perform_release 強制 false）
  commit_result: apply 階段執行 git ops 的結果

governance:
  watcher_mode: final_only
  logger_mode: final_only
  watcher_checkpoints: []
  logger_checkpoints: []
  halt_on_missing_handoff: false

steps:
  - id: vc_scan
    name: Scan repo and emit evidence pack
    capability: version_control_commit
    executor: shell
    script: scripts/workflows/vc-scan.sh
    inputs:
      - repo_changes
      - commit_scope
      - project_context
    outputs:
      - vc_evidence_pack
    done_when:
      - 已偵測 git work tree 與分支狀態
      - no_changes 直接 exit 10 結束 workflow
      - 已輸出 evidence pack
    on_fail: halt
    timeout_seconds: 60

  - id: vc_compose
    name: Compose commit-only envelope (no release)
    capability: version_control_commit
    needs:
      - vc_scan
    inputs:
      - vc_evidence_pack
    outputs:
      - commit_envelope
    done_when:
      - 已讀取 evidence pack（不得重跑 git）
      - 已產出 envelope JSON，且 release.perform_release=false
      - subject 命中至少一個 path_token，且未使用禁止主動詞
    on_fail: halt
    timeout_seconds: 180
    notes:
      - "Quick path 嚴禁發版：envelope.release.perform_release 必須為 false，即使 evidence.release_intent=true 也不得產 tag/CHANGELOG 內容"
      - "subject 規則：動詞開頭、≤72 字、必須引用 evidence.path_tokens 任一個、避開禁止主動詞清單"
      - "禁止主動詞清單：enforce/sync/refine/unify/streamline/consolidate/clarify/harden/strengthen/establish/introduce/govern/finalize/polish/adjust/tweak/optimize/enhance"
      - "若使用者要求發版，請在 stdout 提示應改用 version-control-private workflow，不要在本流程強行 release"

  - id: vc_apply
    name: Lint envelope and execute commit + push
    capability: version_control_commit
    executor: shell
    script: scripts/workflows/vc-apply.sh
    needs:
      - vc_compose
    inputs:
      - vc_evidence_pack
      - commit_envelope
    outputs:
      - commit_result
    done_when:
      - lint 通過
      - 已 commit 並依 upstream 推送
    on_fail: halt
    timeout_seconds: 90
    notes:
      - quick path 不會執行 tag / CHANGELOG / README 同步邏輯（envelope.release.perform_release=false 時 vc-apply.sh 自然跳過該段）
