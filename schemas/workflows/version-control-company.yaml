workflow_id: version-control-company
version: 2
name: Company Project Version Control
summary: 公司專案版本控制 pipeline：與 private 共用 scan → compose → apply 三段；governance 較嚴格，watcher 在 apply checkpoint 介入結構稽核。
owner: supervisor
triggers:
  - manual
  - version-control
  - company-project

artifacts:
  vc_evidence_pack: scan 階段輸出的結構化 evidence
  commit_envelope: compose 階段輸出的 commit 結構化 JSON
  commit_result: apply 階段執行 git ops 的結果

governance:
  watcher_mode: milestone_gate
  logger_mode: milestone_log
  watcher_checkpoints: [vc_apply]
  logger_checkpoints: [vc_compose, vc_apply]
  halt_on_missing_handoff: true

steps:
  - id: vc_scan
    name: Scan repo and emit evidence pack
    capability: version_control_commit
    executor: shell
    script: scripts/workflows/vc-scan.sh
    inputs:
      - repo_changes
      - commit_scope
      - project_context
    outputs:
      - vc_evidence_pack
    done_when:
      - 已掃描並產出 evidence pack；no_changes / sensitive / detached_head 直接 halt
    on_fail: halt
    timeout_seconds: 60

  - id: vc_compose
    name: Compose commit envelope from evidence
    capability: version_control_commit
    needs:
      - vc_scan
    inputs:
      - vc_evidence_pack
    outputs:
      - commit_envelope
    done_when:
      - envelope 結構齊備、subject / annotation 通過 lint 規範
      - 涉及多模組變更時，body 必須說明跨模組影響
    on_fail: halt
    timeout_seconds: 240
    notes:
      - 公司專案要求 body 對重大變更（破壞性 / 跨模組）必須敘述影響範圍與遷移步驟
      - 其餘規則同 version-control-private（subject 動詞 + path_token、禁止主動詞、release 必須由 evidence.release_intent 授權）

  - id: vc_apply
    name: Lint envelope and execute git ops
    capability: version_control_commit
    executor: shell
    script: scripts/workflows/vc-apply.sh
    needs:
      - vc_compose
    inputs:
      - vc_evidence_pack
      - commit_envelope
    outputs:
      - commit_result
    done_when:
      - lint 通過
      - commit / tag / push 已依 envelope 與 upstream 狀態完成
    on_fail: halt
    timeout_seconds: 180
    notes:
      - 公司專案的 push 失敗、CI 觸發異常都應在 stdout 標明，由 watcher 在 apply checkpoint 確認治理結果
