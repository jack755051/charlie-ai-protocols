schema_version: 1
repo_id: charlie-ai-protocols
name: "Charlie's AI Protocols (CAP)"
display_name: AI 多代理協作系統
summary: >
  本地 AI agent 協作規範與 CLI 工具。定義 agent 角色邊界、交接協議與 workflow 契約，
  搭配 Shell CLI（cap）與 runtime storage，把角色分工、執行紀錄與常用流程整理成可追蹤的形式。
# CAP release/version metadata SSOT — read by cap-paths.sh and
# project_context_loader.py when writing identity ledgers
# (~/.cap/projects/<id>/.identity.json). See policies/cap-storage-metadata.md §2.
# Release workflow MUST bump this in lock-step with git tag and CHANGELOG.md.
cap_version: v0.22.0-rc1
owner: jack755051
maintainers:
  - jack755051
status: active
visibility: public
repository_url: https://github.com/jack755051/charlie-ai-protocols
default_branch: main

category: ai-tooling
project_type: framework
role: Author & Maintainer
period:
  start: 2026-04
  end: ongoing

stack:
  - python
  - crewai
  - shell
  - makefile
  - markdown

languages:
  - python
  - shell
  - markdown
  - yaml

frameworks:
  engine: crewai>=1.14
  cli: shell (cap)
  consumers:
    - claude-code
    - openai-codex
    - crewai

entrypoints:
  cli: scripts/cap-entry.sh
  makefile: Makefile
  workflow_cli: scripts/cap-workflow.sh
  engine: engine/main.py
  factory: engine/factory.py
  installer: install.sh
  constitution: agent-skills/00-core-protocol.md
  project_constitution: .cap.constitution.yaml
  agent_registry: .cap.agents.json
  skill_registry: .cap.skills.yaml
  project_config: .cap.project.yaml

commands:
  install: bash install.sh
  dev: cap run
  test: not_applicable
  setup: cap setup
  sync: cap sync
  run: cap run
  list: cap skill list
  skill_check_aliases: cap skill check-aliases
  version: cap version
  update: cap update
  uninstall: cap uninstall
  help: cap help
  workflow_list: cap workflow list
  workflow_ps: cap workflow ps
  workflow_show: cap workflow show <id>
  workflow_inspect: cap workflow inspect <run-id>
  workflow_plan: cap workflow plan <id>
  workflow_bind: cap workflow bind <id> [registry]
  workflow_constitution: cap workflow constitution "<request>"
  workflow_compile: cap workflow compile "<request>"
  workflow_run_task: cap workflow run-task [--dry-run] "<request>"
  workflow_run: cap workflow run <id> [prompt]
  workflow_dry_run: cap workflow run --dry-run <id> [prompt]

interfaces:
  cli: true
  api: false
  web_ui: false
  worker: false
  cron: false

docs:
  architecture: docs/cap/ARCHITECTURE.md
  readme: README.md
  workflows: workflows/README.md
  platform_goal: docs/cap/PLATFORM-GOAL.md
  implementation_roadmap: docs/cap/IMPLEMENTATION-ROADMAP.md
  skill_runtime: docs/cap/SKILL-RUNTIME-ARCHITECTURE.md

runtime:
  python: ">=3.10"
  shell: bash / zsh

agents:
  count: 17
  governance:
    - id: "01"
      name: Supervisor
      prefix: $supervisor
  delivery:
    - id: "02"
      name: Tech Lead
      prefix: $techlead
    - id: 02a
      name: BA
      prefix: $ba
    - id: 02b
      name: DBA/API
      prefix: $dba
    - id: "03"
      name: UI
      prefix: $ui
    - id: "12"
      name: Figma Sync
      prefix: $figma
    - id: "09"
      name: Analytics
      prefix: $analytics
    - id: "04"
      name: Frontend
      prefix: $frontend
    - id: "05"
      name: Backend
      prefix: $backend
  gates:
    - id: "90"
      name: Watcher
      prefix: $watcher
    - id: "08"
      name: Security
      prefix: $security
    - id: "07"
      name: QA
      prefix: $qa
    - id: "10"
      name: Troubleshoot
      prefix: $troubleshoot
    - id: "11"
      name: SRE
      prefix: $sre
    - id: "06"
      name: DevOps
      prefix: $devops
  closing:
    - id: "99"
      name: Logger
      prefix: $logger
  optional:
    - id: "101"
      name: README
      prefix: $readme

strategies:
  frontend:
    - angular
    - nextjs
    - nuxtjs
  backend:
    - dotnet
    - nestjs
  testing:
    - playwright
    - k6
    - unit-test-frontend
    - unit-test-backend
  audit:
    - lighthouse

schemas:
  workflows: schemas/workflows/
  capabilities: schemas/capabilities.yaml
  handoff_schema: schemas/handoff-ticket.schema.yaml

features:
  - 17 位專職 AI Agent，涵蓋 PM / Tech Lead / BA / DBA / UI / Frontend / Backend / DevOps / QA / Security / SRE / Analytics / Troubleshoot / Figma Sync / Logger / Watcher / README
  - 全域憲法 (00-core-protocol.md) 統一所有 Agent 的行為準則與溝通語言
  - 三消費者架構：同一份 SSOT 同時供 CrewAI、Claude Code (@import)、Codex ($prefix) 使用
  - CLI 工具 (cap)：一鍵安裝、版本管理、Agent 調用、session tracing
  - BYOCLI 模式：在任何 AI CLI 中以 $prefix 臨時調用單一 Agent
  - 雙寫 Trace 機制：純文字 (.log) + 結構化 (.jsonl) 同步寫入
  - Release 管理：cap update / rollback 支援 tag 與 branch 切換
  - 10 套框架與工具策略 (Angular / Next.js / Nuxt.js / .NET / NestJS / Playwright / k6 / Lighthouse / Unit Test)
  - README 治理系統：情境式路由自動判定 rewrite / normalize / manifest_plus_readme
  - Promote 工作流：本機產物升級至 repo 正式路徑

architecture:
  pattern: Multi-agent orchestration with shared constitution
  consumers:
    - name: CrewAI
      entry: engine/factory.py
      method: Glob *-agent.md, prepend 00-core-protocol.md as backstory
    - name: Claude Code
      entry: CLAUDE.md
      method: "@import agent-skills via ~/.claude/rules/"
    - name: OpenAI Codex
      entry: AGENTS.md
      method: "$prefix invocation via ~/.agents/skills/"
  storage:
    global: "~/.cap/"
    project: "~/.cap/projects/<project_id>/"
    layers:
      - traces (session logs)
      - drafts (work in progress)
      - reports (finalized output)

tags:
  - ai-agents
  - multi-agent
  - crewai
  - cli-tool
  - developer-tools
  - software-engineering
  - quality-gates
  - portfolio
  - python
  - shell

portfolio:
  featured: true
  priority: 2
  card_title: "Charlie's AI Protocols"
  card_subtitle: 本地 AI agent 協作規範與 CLI
  highlights:
    - 17 位 agent skill 定義角色邊界與交接責任
    - CLI 工具 (cap) 支援安裝、版本管理與 session tracing
    - 三消費者架構：CrewAI / Claude Code / Codex 共用同一份 SSOT
    - BYOCLI 模式：$prefix 臨時調用任意 Agent
    - 10 套框架策略與 README 治理系統
