# .cap.skills.example.yaml
#
# 這是 .cap.skills.yaml 的最小啟動骨架（bootstrap skeleton）。
# 安裝 CAP 後若想自建 skill registry，可從這份範本起步：
#
#   cp .cap.skills.example.yaml .cap.skills.yaml
#   # 接著按 docs/cap/SKILL-RUNTIME-ARCHITECTURE.md 的指引擴充其餘 skill
#
# 為什麼只放最小集合：
# - 完整 17 個 builtin agent + 4 個 generic fallback 已內建於 CAP repo 自己的 .cap.skills.yaml
# - 此 .example 故意只列「跑 workflow-smoke-test 與 version-control 的最低必要 skill」
# - 避免使用者誤解兩份檔需要 100% 同步（先前 .example 與 .yaml 完全一致曾造成混淆）
#
# 完整 registry 結構與欄位語意請見：
#   docs/cap/SKILL-RUNTIME-ARCHITECTURE.md
#   schemas/skill-registry.schema.yaml

schema_version: 1

default_provider: builtin

binding_defaults:
  binding_mode: fallback_allowed
  missing_policy: manual

skills:
  - skill_id: builtin-supervisor

    agent_alias: supervisor
    provider: builtin
    enabled: true
    priority: 100
    prompt_file: 01-supervisor-agent.md
    cli: codex
    compatible_workflow_versions: [1, 2, 3]
    provided_capabilities:
      - prd_generation
      - workflow_orchestration
      - project_constitution
    fallback_roles:
      - supervisor

  - skill_id: builtin-readme

    agent_alias: readme
    provider: builtin
    enabled: true
    priority: 100
    prompt_file: 101-readme-agent.md
    cli: codex
    compatible_workflow_versions: [1, 2, 3]
    provided_capabilities:
      - readme_normalization
    fallback_roles:
      - implementer

  - skill_id: builtin-devops

    agent_alias: devops
    provider: builtin
    enabled: true
    priority: 100
    prompt_file: 06-devops-agent.md
    cli: codex
    compatible_workflow_versions: [1, 2, 3, 4, 5, 6, 7]
    provided_capabilities:
      - devops_delivery
      - version_control_commit
      - version_control_tag
    fallback_roles:
      - implementer

  # generic-* 是缺 skill 時 fallback_allowed 模式下的最後一道防線。
  # 至少保留一個 generic-supervisor，避免在 binding 階段直接 blocked。
  - skill_id: generic-supervisor

    agent_alias: generic-supervisor
    provider: builtin
    enabled: true
    priority: 10
    prompt_file: 01-supervisor-agent.md
    cli: codex
    compatible_workflow_versions: [1, 2, 3]
    provided_capabilities: []
    fallback_roles:
      - supervisor
